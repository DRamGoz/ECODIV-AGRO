<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ECODIV-AGRO | Control de Riego</title>
  
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body id="pantalla">

  <div class="contenedor">

    <!-- Cabecera: Título y estado -->
    <header class="cabecera">
      <p>ECODIV-AGRO | CONTROL DE RIEGO v2.1</p>
      <div id="estado-texto">RIEGO | OFF</div>
    </header>

    <!-- Tarjeta de la Planta -->
    <section class="tarjeta-wrapper">
      <div id="tarjeta">
        <lottie-player 
          id="planta" 
          src="plant4_v6.json"  
          background="transparent" 
          speed="1"
        ></lottie-player>
      </div>
    </section>

    <!-- Botones de Control -->
    <section class="botones-wrapper">
      <button id="btn-on">ENCENDER RIEGO</button>
      <button id="btn-off">APAGAR RIEGO</button>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
